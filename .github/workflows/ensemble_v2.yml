name: Süper Loto Ensemble Bot V2

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas numpy openpyxl
      - name: Run Ensemble Bot V2
        run: python bot/superloto_ensemble_v2.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ensemble-v2-results
          path: outputs/
