name: On Numara Pattern Master

on:
  workflow_dispatch:  # Sadece manuel tetikleme

jobs:
  run-pattern-master:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy openpyxl
    
    - name: Run On Numara Pattern Master
      run: |
        python bot/onnumara_pattern_master.py
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: onnumara-pattern-master-results
        path: outputs/
        retention-days: 30
    
    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add outputs/ || true
        git commit -m "Auto-update: On Numara pattern master results" || echo "No changes to commit"
        git push || echo "No changes to push"
