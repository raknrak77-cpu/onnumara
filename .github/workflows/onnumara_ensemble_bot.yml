name: On Numara Ensemble Bot

on:
  workflow_dispatch:

jobs:
  run-ensemble-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy openpyxl
    
    - name: Run On Numara Ensemble Bot
      run: |
        python bot/onnumara_ensemble_bot.py
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: onnumara-ensemble-results
        path: outputs/
        retention-days: 30
    
    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add outputs/ || true
        git commit -m "Auto-update: On Numara ensemble results" || echo "No changes"
        git push || echo "No changes"
